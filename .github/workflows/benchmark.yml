name: Benchmark

# Runs the benchmark suite and refreshes the results table in the README.
# Updating + committing only happens on pushes to master; on pull requests the
# benchmarks are built and run (as a smoke test) but the README is not modified.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build benchmarks
        run: cmake --build build --target kalman_benchmark

      - name: Run benchmarks
        run: ./build/benchmark/kalman_benchmark --markdown | tee benchmark.md

      - name: Update README table
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: python3 scripts/update_readme_benchmark.py benchmark.md

      - name: Commit updated README
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          if git diff --quiet -- README.md; then
            echo "No benchmark changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "ci: refresh benchmark results in README [skip ci]"
          git push
