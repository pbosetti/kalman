name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.platform.name }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        platform:
          - { name: Linux GCC, os: ubuntu-latest, cc: gcc, cxx: g++ }
          - { name: Linux Clang, os: ubuntu-latest, cc: clang, cxx: clang++ }
          - { name: macOS Clang, os: macos-latest, cc: clang, cxx: clang++ }
          - { name: Windows MSVC, os: windows-latest }
    steps:
      - uses: actions/checkout@v4

      # On Unix the compiler is selected through the CC/CXX environment
      # variables. On Windows CMake picks up the latest Visual Studio
      # generator automatically, so no compiler selection is needed.
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.platform.cc }}
          CXX: ${{ matrix.platform.cxx }}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          find include test examples benchmark \
            -type f \( -name '*.hpp' -o -name '*.cpp' -o -name '*.h' \) \
            -print0 | xargs -0 clang-format-18 --dry-run --Werror
